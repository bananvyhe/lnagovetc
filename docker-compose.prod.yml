services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lnagovetc_production}
      POSTGRES_USER: ${POSTGRES_USER:-lnagovetc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/log/postgres:/var/lib/postgresql/data/log
    command:
      [
        "postgres",
        "-c",
        "logging_collector=on",
        "-c",
        "log_file_mode=0644",
        "-c",
        "log_directory=/var/lib/postgresql/data/log",
        "-c",
        "log_filename=postgresql.log"
      ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_data:/data
      - ./backend/log/redis:/data/log
    command:
      [
        "sh",
        "-lc",
        "umask 022; exec redis-server --appendonly yes --logfile /data/log/redis.log"
      ]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SKIP_ASSETS: "1"
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      RAILS_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      RAILS_LOG_TO_STDOUT: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3000"
    command:
      [
        "bash",
        "-lc",
        "umask 022 && cd /rails && mkdir -p log && { bundle exec rails db:prepare && exec bundle exec rails server -b 0.0.0.0 -p 3000; }"
      ]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - ./backend/log/frontend:/var/log/nginx
    ports:
      - "127.0.0.1:8081:80"

volumes:
  postgres_data:
  redis_data:
