services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lnagovetc_production}
      POSTGRES_USER: ${POSTGRES_USER:-lnagovetc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SKIP_ASSETS: "1"
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      RAILS_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-lnagovetc}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lnagovetc_production}
      REDIS_URL: redis://redis:6379/0
      RAILS_LOG_TO_STDOUT: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/bin/bash", "-lc", "./bin/rails db:prepare && bundle exec puma -C config/puma.rb"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:80"

volumes:
  postgres_data:
  redis_data:
